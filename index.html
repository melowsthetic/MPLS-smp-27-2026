<!DOCTYPE html>
<html lang="id">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Twibbon MPLS SMPN 27 2026</title>

<link rel="stylesheet" href="style.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

</head>

<body>

<div class="container">

<div class="header">

<img src="assets/logo.png" class="logo">

<h1>MPLS SMP Negeri 27</h1>

<p>Upload Foto Peserta</p>

</div>
<div class="music-box">

<button id="musicBtn">

🎵 Putar Musik

</button>

<audio id="bgMusic" loop>

<source src="assets/music.mp3" type="audio/mpeg">

</audio>

</div>

<div class="editor">

<img
id="photo"
src=""
>

<img
id="frame"
src="assets/twibbon.png"
>

<canvas id="exportCanvas" width="1280" height="1280" style="display:none;"></canvas>

</div>


<div class="toolbar">

    <button id="uploadBtn">
        📷 Upload Foto
    </button>

    <button id="downloadBtn">
        💾 Download
    </button>

    <button id="copyBtn">
        📋 Copy Caption
    </button>

</div>

<div class="controls">

    <button id="zoomOut">➖</button>
    <button id="zoomIn">➕</button>

    <button id="rotateLeft">⟲</button>
    <button id="rotateRight">⟳</button>

</div>
<div class="join-box">

<h3>👥 Grup WhatsApp Angkatan 2</h3>

<p>
Setelah selesai membuat Twibbon,
silakan bergabung ke grup WhatsApp.
</p>

<img src="assets/qr-wa.png" class="qr">

<br><br>

<button id="waBtn">

👥 Join Grup WhatsApp

</button>

</div>
<input
type="file"
id="upload"
accept="image/*"
hidden>

</div>

<script src="script.js"></script>

</body>

</html>
